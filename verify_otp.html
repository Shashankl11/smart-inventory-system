<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP - Smart Inventory</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; height: 100vh; }
        .otp-card { max-width: 400px; width: 100%; margin: auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0px 8px 20px rgba(0,0,0,0.1); }
        .btn-success { background-color: #27ae60; border: none; }
    </style>
</head>
<body>
    <div class="otp-card text-center">
        <h3 class="mb-3">Verify OTP</h3>
        <p class="text-muted">Check your email for the 4-digit code.</p>
        
        <form action="/verify-otp" method="POST">
            <input type="hidden" name="username" value="{{ username }}">
            
            <div class="mb-3">
                <input type="text" name="otp" class="form-control form-control-lg text-center" placeholder="0000" required maxlength="4">
            </div>
            
            <div class="mb-3">
                <input type="password" name="new_password" class="form-control" placeholder="Enter New Password" required>
            </div>
            
            <button type="submit" class="btn btn-success w-100">Update Password</button>
        </form>
    </div>
</body>
</html>
