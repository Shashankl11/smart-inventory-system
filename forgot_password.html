<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Smart Inventory</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; height: 100vh; }
        .forgot-card { max-width: 400px; width: 100%; margin: auto; padding: 20px; box-shadow: 0px 4px 15px rgba(0,0,0,0.1); background: white; border-radius: 10px; }
        .btn-primary { background-color: #2c3e50; border: none; }
        .btn-primary:hover { background-color: #34495e; }
    </style>
</head>
<body>
    <div class="forgot-card text-center">
        <h3 class="mb-4">Reset Password</h3>
        <p class="text-muted">Enter your username to receive a 4-digit OTP via email.</p>
        
        <form action="/forgot-password" method="POST">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send OTP</button>
        </form>
        
        <div class="mt-3">
            <a href="/" class="text-decoration-none" style="color: #2c3e50;">Back to Login</a>
        </div>
    </div>
</body>
</html>
