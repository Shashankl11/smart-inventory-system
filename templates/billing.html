<!DOCTYPE html>
<html>
<head>
    <title>Smart Billing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .billing-card { border-radius: 15px; border: none; }
        .total-display { background: #e9ecef; border-radius: 10px; padding: 15px; border: 2px dashed #6c757d; }
        h6 { font-weight: bold; color: #495057; }
    </style>
</head>
<body>

    <div class="container mt-5">
        <div class="card billing-card shadow-lg">
            <div class="card-header bg-primary text-white p-3 text-center">
                <h4 class="mb-0">🧾 Smart Invoice & Customer Registration</h4>
            </div>
            
            <div class="card-body p-4">
                <form action="/process-bill" method="POST">
                    
                    <div class="row border p-3 mb-4 bg-light rounded shadow-sm">
                        <h6 class="mb-3">👤 Customer Details (For Offers & New Arrivals)</h6>
                        <div class="col-md-4 mb-2">
                            <label class="form-label small">Full Name</label>
                            <input type="text" name="cust_name" class="form-control" placeholder="e.g. John Doe" required>
                        </div>
                        <div class="col-md-4 mb-2">
                            <label class="form-label small">Email Address</label>
                            <input type="email" name="cust_email" class="form-control" placeholder="john@example.com" required>
                        </div>
                        <div class="col-md-4 mb-2">
                            <label class="form-label small">Mobile Number</label>
                            <input type="text" name="cust_phone" class="form-control" placeholder="+91 0000000000">
                        </div>
                    </div>

                    <div class="row mb-4">
                        <h6 class="mb-3">📦 Item Details</h6>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Select Product</label>
                            <select name="product_id" id="product_select" class="form-select" onchange="updatePrice()" required>
                                <option value="" disabled selected>-- Choose Product --</option>
                                {% for p in products %}
                                <option value="{{ p.product_id }}" data-price="{{ p.base_price }}" data-stock="{{ p.current_stock }}">
                                    {{ p.name }} (Available: {{ p.current_stock }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Unit Price (₹)</label>
                            <input type="text" id="unit_price" class="form-control bg-white" readonly placeholder="0.00">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Quantity</label>
                            <input type="number" name="quantity" id="qty_input" class="form-control" min="1" oninput="calculateTotal()" required>
                        </div>
                    </div>

                    <div class="total-display text-center mb-4">
                        <h3 class="text-dark mb-0">Grand Total: ₹ <span id="display_total">0.00</span></h3>
                    </div>

                    <div class="row pt-2">
                        <div class="col-md-6 mb-2">
                            <a href="/dashboard" class="btn btn-outline-secondary w-100 py-2">Cancel & Back</a>
                        </div>
                        <div class="col-md-6 mb-2">
                            <button type="submit" class="btn btn-success w-100 py-2 shadow-sm">Confirm & Send Receipt</button>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script>
        function updatePrice() {
            var select = document.getElementById('product_select');
            var selectedOption = select.options[select.selectedIndex];
            var price = selectedOption.getAttribute('data-price');
            
            document.getElementById('unit_price').value = price;
            calculateTotal();
        }

        function calculateTotal() {
            var price = parseFloat(document.getElementById('unit_price').value) || 0;
            var qty = parseInt(document.getElementById('qty_input').value) || 0;
            var total = price * qty;
            
            // Format number with commas for Indian Rupees
            document.getElementById('display_total').innerText = total.toLocaleString('en-IN', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
    </script>

</body>
</html>
