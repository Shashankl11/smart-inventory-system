<!DOCTYPE html>
<html>
<head>
    <title>Transactions</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-secondary p-3 mb-4">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">⬅ Back to Dashboard</a>
            <span class="navbar-text text-white">Transaction Log</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            
            <div class="col-md-4">
                <div class="card p-3 shadow-sm border-success">
                    <h4 class="text-success">💸 Record Transaction</h4>
                    <hr>
                    <form action="/transactions" method="post">
                        <div class="mb-3">
                            <label for="product_id">Select Product</label>
<select name="product_id" id="product_id" class="form-control" required>
    <option value="" disabled selected>-- Select a Product --</option>
    {% for p in products %}
    <option value="{{ p.product_id }}">{{ p.name }} (Stock: {{ p.current_stock }})</option>
    {% endfor %}
</select>
                        </div>
                        <div class="mb-3">
                            <label>Transaction Type</label>
                            <select name="type" class="form-select">
                                <option value="OUT">Scale (Stock OUT)</option>
                                <option value="IN">Restock (Stock IN)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Quantity</label>
                            <input type="number" name="quantity" class="form-control" min="1" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Submit</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-3 shadow-sm">
                    <h4>📜 Recent Activity</h4>
                    <table class="table table-hover mt-3">
                        <thead class="table-light">
                            <tr>
                                <th>Date</th>
                                <th>Product</th>
                                <th>Type</th>
                                <th>Qty</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for t in history %}
                            <tr>
                                <td>{{ t.txn_date }}</td>
                                <td>{{ t.name }}</td>
                                <td>{{ loop.index }}</td>
                                <td>
                                    {% if t.txn_type == 'IN' %}
                                    <span class="badge bg-success">IN</span>
                                    {% else %}
                                    <span class="badge bg-danger">OUT</span>
                                    {% endif %}
                                </td>
                                <td>{{ t.quantity }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
